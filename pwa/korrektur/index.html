<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BauDiktat – Korrekturplatz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0a;--bg2:#131310;--bg3:#1a1a16;
  --surface:#222220;--surface2:#2a2a26;--surface3:#323230;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f5f3ed;--text2:#c4c0b8;--text3:#7a7874;
  --accent:#e09a1a;--adim:rgba(224,154,26,0.13);--adim2:rgba(224,154,26,0.24);
  --red:#d94f3a;--rdim:rgba(217,79,58,0.14);
  --green:#52b06a;--gdim:rgba(82,176,106,0.12);
  --blue:#4a8fd4;--bdim:rgba(74,143,212,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;align-items:center;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.topbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
.topbar-badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:99px;background:var(--adim);color:var(--accent);border:1px solid var(--adim2);}
.topbar-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto;}
.topbar-actions{display:flex;gap:8px;}

.main{display:flex;flex:1;overflow:hidden;}

/* Session List (left sidebar) */
.sidebar{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg2);}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
.session-list{flex:1;overflow-y:auto;padding:8px;}
.session-item{padding:10px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;margin-bottom:4px;transition:all 0.15s;}
.session-item:hover{background:var(--surface);border-color:var(--border);}
.session-item.active{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 1px var(--adim2);}
.session-item-row{display:flex;align-items:center;gap:8px;}
.session-item-info{flex:1;min-width:0;}
.session-item-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.session-item-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);display:flex;gap:8px;}
.btn-delete-session{width:24px;height:24px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;opacity:0;}
.session-item:hover .btn-delete-session{opacity:1;}
.btn-delete-session:hover{background:var(--rdim);color:var(--red);border-color:rgba(217,79,58,0.3);}
.session-item-corrected{font-size:9px;color:var(--green);font-family:'DM Mono',monospace;margin-top:3px;}
.no-sessions{padding:20px;text-align:center;color:var(--text3);font-size:12px;line-height:1.8;}

/* Editor Area */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.editor-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;flex-direction:column;gap:12px;}
.editor-empty-icon{font-size:48px;opacity:0.3;}

/* Audio Player */
.audio-bar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.btn-play{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#111;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.btn-play:hover{background:#c88415;transform:scale(1.05);}
.time-display{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);min-width:90px;}
.waveform-bar{flex:1;height:40px;background:var(--surface);border-radius:6px;position:relative;cursor:pointer;overflow:hidden;}
.waveform-progress{height:100%;background:var(--adim2);border-radius:6px;transition:width 0.1s linear;pointer-events:none;}
.waveform-cursor{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);pointer-events:none;transition:left 0.1s linear;}
.speed-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;border-radius:4px;background:var(--surface);color:var(--text2);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;}
.speed-btn:hover,.speed-btn.active{background:var(--adim);color:var(--accent);border-color:var(--adim2);}

/* Text Editor */
.editor-scroll{flex:1;overflow-y:auto;padding:24px;}
.block-container{max-width:800px;margin:0 auto;}

.text-block{margin-bottom:16px;position:relative;}
.text-block-content{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;font-size:15px;line-height:1.8;color:var(--text);
  outline:none;min-height:40px;transition:border-color 0.15s;
  white-space:pre-wrap;word-wrap:break-word;
}
.text-block-content:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--adim2);}
.text-block-content .word{cursor:pointer;border-radius:2px;padding:0 1px;transition:background 0.1s;}
.text-block-content .word.highlight{background:var(--adim2);color:var(--accent);}
.text-block-content .word:hover{background:var(--bdim);}

.photo-block{margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.photo-block-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.photo-block-img{width:100%;max-height:300px;object-fit:contain;background:#000;display:block;}
.photo-block-caption{padding:8px 12px;font-size:12px;color:var(--text2);border-top:1px solid var(--border);}
.photo-block-caption input{background:transparent;border:none;color:var(--text2);font-size:12px;font-style:italic;width:100%;outline:none;font-family:'DM Sans',sans-serif;}
.photo-block-caption input:focus{color:var(--text);}
.photo-block-wrap{position:relative;}
.session-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;text-transform:uppercase;letter-spacing:0.05em;}
.session-tag.classic{background:var(--bdim);color:var(--blue);border:1px solid rgba(74,143,212,0.3);}
.classic-hint{background:var(--bdim);border:1px solid rgba(74,143,212,0.3);border-radius:8px;padding:11px 14px;margin-bottom:14px;color:var(--blue);font-size:12px;line-height:1.55;display:flex;align-items:flex-start;gap:8px;}
.classic-hint-icon{font-size:16px;flex-shrink:0;}
.text-block-content.empty-placeholder:empty:before{content:attr(data-placeholder);color:var(--text3);font-style:italic;pointer-events:none;}
.segment-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:18px;}
.segment-card-header{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.segment-card-header .seg-num-pill{background:var(--adim);color:var(--accent);border:1px solid var(--adim2);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:500;}
.segment-player{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.segment-player .sp-play{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.segment-player .sp-play:hover{opacity:0.9;}
.segment-player .sp-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);min-width:82px;}
.segment-player .sp-seek{flex:1;height:6px;background:var(--surface2);border-radius:3px;position:relative;cursor:pointer;}
.segment-player .sp-seek-progress{position:absolute;inset:0;width:0%;background:var(--accent);opacity:0.5;border-radius:3px;}
.segment-player .sp-speed{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;}
.segment-player .sp-speed:hover{background:var(--surface3);color:var(--text);}
.btn-replace-photo{position:absolute;top:8px;right:8px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.7);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;opacity:0;transition:opacity 0.15s;backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;}
.photo-block-wrap:hover .btn-replace-photo{opacity:1;}
.btn-replace-photo:hover{background:rgba(0,0,0,0.9);border-color:var(--accent);color:var(--accent);}

/* Action Buttons */
.btn-action{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.btn-save{background:var(--gdim);color:var(--green);border:1px solid rgba(82,176,106,0.35);}
.btn-save:hover{background:rgba(82,176,106,0.25);}
.btn-save:disabled{opacity:0.4;cursor:not-allowed;}
.btn-download{background:var(--adim);color:var(--accent);border:1px solid var(--adim2);}
.btn-download:hover{background:var(--adim2);}
.btn-back{background:var(--surface);color:var(--text2);border:1px solid var(--border2);text-decoration:none;}
.btn-back:hover{background:var(--surface2);color:var(--text);}

/* Status Bar */
.status-bar{padding:8px 24px;border-top:1px solid var(--border);background:var(--bg2);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);display:flex;align-items:center;gap:16px;flex-shrink:0;}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-dot.saved{background:var(--green);}
.status-dot.unsaved{background:var(--accent);animation:pulse 1.5s ease-in-out infinite;}
.status-dot.saving{background:var(--blue);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:100;transform:translateY(80px);opacity:0;transition:all 0.3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--gdim);color:var(--green);border:1px solid rgba(82,176,106,0.35);}
.toast.error{background:var(--rdim);color:var(--red);border:1px solid rgba(217,79,58,0.3);}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px;}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .audio-bar{padding:8px 12px;gap:8px;}
  .editor-scroll{padding:12px;}
}
</style>
</head>
<body>
<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <a href="/" class="btn-action btn-back">← BauDiktat</a>
    <div class="topbar-title">Korrekturplatz</div>
    <div class="topbar-badge" id="topbar-badge">ASKA</div>
    <div class="topbar-meta" id="topbar-meta"></div>
    <div class="topbar-actions">
      <button class="btn-action btn-save" id="btn-save" disabled onclick="saveCorrection()">Speichern & DOCX</button>
      <a class="btn-action btn-download" id="btn-download" style="display:none" href="#" download>DOCX herunterladen</a>
    </div>
  </div>

  <div class="main">
    <!-- Session List -->
    <div class="sidebar">
      <div class="sidebar-header">Sessions</div>
      <div class="session-list" id="session-list">
        <div class="no-sessions" id="no-sessions">Keine Sessions vorhanden.<br>Erstelle zuerst ein Diktat.</div>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-area" id="editor-area">
      <div class="editor-empty" id="editor-empty">
        <div class="editor-empty-icon">🎧</div>
        <div>Session auswaehlen zum Korrigieren</div>
      </div>

      <!-- Audio Player (hidden until session loaded) -->
      <div class="audio-bar" id="audio-bar" style="display:none;">
        <button class="btn-play" id="btn-play" onclick="togglePlay()">&#9654;</button>
        <div class="time-display" id="time-display">00:00 / 00:00</div>
        <div class="waveform-bar" id="waveform-bar" onclick="seekAudio(event)">
          <div class="waveform-progress" id="waveform-progress"></div>
          <div class="waveform-cursor" id="waveform-cursor"></div>
        </div>
        <button class="speed-btn" id="speed-btn" onclick="cycleSpeed()">1.0x</button>
      </div>

      <!-- Text Blocks -->
      <div class="editor-scroll" id="editor-scroll" style="display:none;">
        <div class="block-container" id="block-container"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot saved" id="status-dot"></div>
    <span id="status-text">Bereit</span>
    <span style="margin-left:auto" id="status-session"></span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Audio Element -->
<audio id="audio" preload="auto"></audio>

<script>
(function() {
'use strict';

const BACKEND = window.location.origin;
const audio = document.getElementById('audio');

let currentSession = null;
let currentBlocks = [];
let wordElements = [];
let isDirty = false;
let currentSpeed = 1.0;
const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadSessions();

  // Check URL for direct session access
  const pathMatch = window.location.pathname.match(/\/korrektur\/([a-f0-9-]+)/);
  if (pathMatch) {
    loadSession(pathMatch[1]);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      if (!document.getElementById('btn-save').disabled) saveCorrection();
    }
    // Space to play/pause (only when not editing text)
    if (e.key === ' ' && document.activeElement.tagName !== 'DIV' &&
        document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      togglePlay();
    }
  });

  // Audio time update for word highlighting
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('ended', () => {
    document.getElementById('btn-play').innerHTML = '&#9654;';
  });
});

// ── Session List ──────────────────────────────────────────────────────────
async function loadSessions() {
  try {
    const resp = await fetch(`${BACKEND}/api/sessions`);
    const sessions = await resp.json();

    const list = document.getElementById('session-list');
    const noSessions = document.getElementById('no-sessions');

    if (sessions.length === 0) {
      noSessions.style.display = 'block';
      return;
    }
    noSessions.style.display = 'none';

    list.innerHTML = sessions.map(s => `
      <div class="session-item" data-id="${s.sessionId}" onclick="window._loadSession('${s.sessionId}')">
        <div class="session-item-row">
          <div class="session-item-info">
            <div class="session-item-title">${s.projectName}${s.mode === 'classic' ? '<span class="session-tag classic">Classic</span>' : ''}</div>
            <div class="session-item-meta">
              <span>${s.dateFormatted}</span>
              <span>${s.blockCount} Bl.</span>
              <span>${s.photoCount} Fotos</span>
              ${s.hasAudio ? '<span style="color:var(--green)">Audio</span>' : ''}
            </div>
          </div>
          <button class="btn-delete-session" title="Session loeschen" onclick="event.stopPropagation(); window._deleteSession('${s.sessionId}', '${s.projectName}', '${s.dateFormatted}')">&#10005;</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    console.error('Sessions laden fehlgeschlagen:', err);
  }
}

window._loadSession = (id) => loadSession(id);

window._deleteSession = async (id, name, date) => {
  if (!confirm(`Session "${name}" vom ${date} wirklich loeschen?\n\nAudio, Fotos und DOCX werden unwiderruflich geloescht.`)) return;

  try {
    const resp = await fetch(`${BACKEND}/api/session/${id}`, { method: 'DELETE' });
    if (!resp.ok) throw new Error('Loeschen fehlgeschlagen');

    // Falls die geloeschte Session gerade offen ist, Editor zuruecksetzen
    if (currentSession && currentSession.sessionId === id) {
      currentSession = null;
      currentBlocks = [];
      document.getElementById('audio-bar').style.display = 'none';
      document.getElementById('editor-scroll').style.display = 'none';
      document.getElementById('editor-empty').style.display = 'flex';
      document.getElementById('btn-download').style.display = 'none';
      document.getElementById('btn-save').disabled = true;
      document.getElementById('topbar-meta').textContent = '';
      audio.src = '';
    }

    loadSessions();
    showToast('Session geloescht', 'success');
  } catch (err) {
    showToast('Fehler: ' + err.message, 'error');
  }
};

// ── Load Session ──────────────────────────────────────────────────────────
async function loadSession(sessionId) {
  try {
    const resp = await fetch(`${BACKEND}/api/session/${sessionId}`);
    if (!resp.ok) throw new Error('Session nicht gefunden');
    currentSession = await resp.json();
    currentBlocks = JSON.parse(JSON.stringify(currentSession.blocks)); // deep copy

    // Update sidebar selection
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === sessionId);
    });

    // Update topbar
    document.getElementById('topbar-meta').textContent =
      `${currentSession.projectName} | ${currentSession.dateFormatted}`;
    document.getElementById('status-session').textContent = sessionId.substring(0, 8);

    // Load audio — bei Classic mit Segment-Audios nutzen wir den globalen Player nicht
    const isClassicWithSegs = currentSession.mode === 'classic' && Array.isArray(currentSession.segmentAudios) && currentSession.segmentAudios.length > 0;
    if (isClassicWithSegs) {
      audio.removeAttribute('src');
      document.getElementById('audio-bar').style.display = 'none';
    } else {
      audio.src = `${BACKEND}/api/session/${sessionId}/audio`;
      document.getElementById('audio-bar').style.display = 'flex';
    }
    document.getElementById('editor-scroll').style.display = 'block';
    document.getElementById('editor-empty').style.display = 'none';

    // Render blocks
    renderBlocks();

    // Enable save button tracking
    isDirty = false;
    updateDirtyState();

    // Download link
    const dlBtn = document.getElementById('btn-download');
    dlBtn.href = `${BACKEND}/download/${sessionId}`;
    dlBtn.style.display = 'flex';

    showToast('Session geladen', 'success');
  } catch (err) {
    console.error('Session laden fehlgeschlagen:', err);
    showToast('Fehler: ' + err.message, 'error');
  }
}

// ── Render Blocks ─────────────────────────────────────────────────────────
function renderBlocks() {
  const container = document.getElementById('block-container');
  container.innerHTML = '';
  wordElements = [];

  // Classic-Mode Hinweis
  const isClassic = currentSession.mode === 'classic';
  const segmentAudios = Array.isArray(currentSession.segmentAudios) ? currentSession.segmentAudios : [];
  const hasSegmentAudios = isClassic && segmentAudios.length > 0;

  if (isClassic) {
    const hint = document.createElement('div');
    hint.className = 'classic-hint';
    hint.innerHTML = `<span class="classic-hint-icon">🎧</span><div><strong>Classic-Session:</strong> Audio abspielen und den Text direkt in die Felder tippen. Die Fotos sind bereits an den richtigen Positionen.</div>`;
    container.appendChild(hint);
  }

  // Build a flat word list from session words for highlighting
  const sessionWords = currentSession.words || [];

  let globalWordIdx = 0;

  // Wenn Classic-Session mit Abschnitts-Audios: pro Abschnitt eine Karte mit eigenem Player.
  if (hasSegmentAudios) {
    const blocksBySeg = new Map();
    const blockIdxMap = new Map();  // blockIdx-Tracking für edit-handler
    currentBlocks.forEach((b, idx) => {
      const seg = (b.segment != null) ? b.segment : 0;
      if (!blocksBySeg.has(seg)) blocksBySeg.set(seg, []);
      blocksBySeg.get(seg).push({ block: b, idx });
    });

    // Segment-Reihenfolge: zuerst die in segmentAudios, danach evtl. weitere aus blocks
    const orderedSegs = [];
    segmentAudios.forEach(sa => { if (!orderedSegs.includes(sa.seg)) orderedSegs.push(sa.seg); });
    Array.from(blocksBySeg.keys())
      .sort((a, b) => a - b)
      .forEach(s => { if (!orderedSegs.includes(s)) orderedSegs.push(s); });

    orderedSegs.forEach(seg => {
      const segBlocks = blocksBySeg.get(seg) || [];
      const audioInfo = segmentAudios.find(sa => sa.seg === seg);
      const audioUrl = audioInfo ? `${BACKEND}/api/session/${currentSession.sessionId}/audio/${seg}` : null;

      const card = document.createElement('div');
      card.className = 'segment-card';

      const header = document.createElement('div');
      header.className = 'segment-card-header';
      header.innerHTML = `<span class="seg-num-pill">Abschnitt ${seg}</span>`;
      card.appendChild(header);

      if (audioUrl) card.appendChild(renderSegmentPlayer(audioUrl));

      segBlocks.forEach(({ block, idx }) => {
        const el = (block.type === 'photo') ? renderPhotoBlock(block, idx) : renderTextBlock(block, idx, null);
        card.appendChild(el);
      });

      container.appendChild(card);
    });

    wordElements = [];
    return;
  }

  // Standard-Rendering (Pro oder Classic ohne Segment-Audios)
  currentBlocks.forEach((block, blockIdx) => {
    if (block.type === 'text') {
      const div = document.createElement('div');
      div.className = 'text-block';

      const content = document.createElement('div');
      content.className = 'text-block-content';
      content.contentEditable = 'true';
      content.dataset.blockIdx = blockIdx;

      // Render words with spans for highlighting
      if (sessionWords.length > 0) {
        const blockWords = block.text.split(/\s+/).filter(w => w.length > 0);
        const spans = blockWords.map((word, i) => {
          const wordData = sessionWords[globalWordIdx] || null;
          const span = `<span class="word" data-word-idx="${globalWordIdx}" `+
            `data-start="${wordData?.start || ''}" data-end="${wordData?.end || ''}">${word}</span>`;
          globalWordIdx++;
          return span;
        });
        content.innerHTML = spans.join(' ');
      } else {
        content.textContent = block.text;
        if (!block.text || block.text.trim() === '') {
          content.classList.add('empty-placeholder');
          content.dataset.placeholder = isClassic
            ? 'Audio abspielen und hier tippen…'
            : 'Text eingeben…';
        }
      }

      // Track changes — remove word spans on edit (timestamps no longer valid)
      content.addEventListener('input', () => {
        const text = content.innerText.trim();
        currentBlocks[blockIdx].text = text;
        isDirty = true;
        updateDirtyState();

        // Platzhalter entfernen sobald Text da ist
        if (text.length > 0) content.classList.remove('empty-placeholder');
        else content.classList.add('empty-placeholder');

        // Strip word spans if still present — highlighting invalid after edit
        if (content.querySelector('.word')) {
          content.textContent = text;
          // Move cursor to end
          const range = document.createRange();
          range.selectNodeContents(content);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          // Rebuild word element list without this block's spans
          wordElements = Array.from(document.getElementById('block-container').querySelectorAll('.word'));
        }
      });

      // Click on word to seek audio
      content.addEventListener('click', (e) => {
        const wordEl = e.target.closest('.word');
        if (wordEl && wordEl.dataset.start) {
          audio.currentTime = parseFloat(wordEl.dataset.start);
          if (audio.paused) togglePlay();
        }
      });

      div.appendChild(content);
      container.appendChild(div);

    } else if (block.type === 'photo') {
      const div = document.createElement('div');
      div.className = 'photo-block';

      const header = document.createElement('div');
      header.className = 'photo-block-header';
      header.textContent = `Foto: ${block.photo} [${formatTime(block.timestamp)}]`;

      const wrap = document.createElement('div');
      wrap.className = 'photo-block-wrap';

      const img = document.createElement('img');
      img.className = 'photo-block-img';
      img.src = `${BACKEND}/api/session/${currentSession.sessionId}/photo/${block.photo}`;
      img.alt = block.photo;
      img.onerror = () => { img.style.display = 'none'; };

      const replaceBtn = document.createElement('button');
      replaceBtn.className = 'btn-replace-photo';
      replaceBtn.innerHTML = '&#128247; Ersetzen';
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      replaceBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async () => {
        if (!fileInput.files[0]) return;
        const fd = new FormData();
        fd.append('photo', fileInput.files[0]);
        try {
          replaceBtn.textContent = 'Hochladen...';
          const resp = await fetch(`${BACKEND}/api/session/${currentSession.sessionId}/photo/${block.photo}`, { method: 'POST', body: fd });
          if (!resp.ok) throw new Error('Upload fehlgeschlagen');
          img.src = `${BACKEND}/api/session/${currentSession.sessionId}/photo/${block.photo}?t=${Date.now()}`;
          img.style.display = 'block';
          isDirty = true;
          updateDirtyState();
          showToast('Foto ersetzt', 'success');
        } catch (err) {
          showToast('Fehler: ' + err.message, 'error');
        } finally {
          replaceBtn.innerHTML = '&#128247; Ersetzen';
        }
      });

      wrap.appendChild(img);
      wrap.appendChild(replaceBtn);
      wrap.appendChild(fileInput);

      const caption = document.createElement('div');
      caption.className = 'photo-block-caption';
      const captionInput = document.createElement('input');
      captionInput.type = 'text';
      captionInput.value = block.caption || '';
      captionInput.placeholder = 'Beschriftung hinzufuegen...';
      captionInput.addEventListener('input', () => {
        currentBlocks[blockIdx].caption = captionInput.value;
        isDirty = true;
        updateDirtyState();
      });
      caption.appendChild(captionInput);

      div.appendChild(header);
      div.appendChild(wrap);
      div.appendChild(caption);
      container.appendChild(div);
    }
  });

  // Collect all word elements for highlighting
  wordElements = Array.from(container.querySelectorAll('.word'));
}

// ── Helpers für Segment-Rendering (Classic) ───────────────────────────────
function renderTextBlock(block, blockIdx, sessionWordsCursor) {
  // sessionWordsCursor nicht genutzt im Classic — Text wird leer sein, User tippt
  const div = document.createElement('div');
  div.className = 'text-block';
  const content = document.createElement('div');
  content.className = 'text-block-content';
  content.contentEditable = 'true';
  content.dataset.blockIdx = blockIdx;
  content.textContent = block.text || '';
  if (!block.text || block.text.trim() === '') {
    content.classList.add('empty-placeholder');
    content.dataset.placeholder = 'Audio abspielen und hier tippen…';
  }
  content.addEventListener('input', () => {
    const text = content.innerText.trim();
    currentBlocks[blockIdx].text = text;
    isDirty = true;
    updateDirtyState();
    if (text.length > 0) content.classList.remove('empty-placeholder');
    else content.classList.add('empty-placeholder');
  });
  div.appendChild(content);
  return div;
}

const segSpeeds = [1.0, 1.25, 1.5, 0.75];
function renderSegmentPlayer(audioUrl) {
  const player = document.createElement('div');
  player.className = 'segment-player';
  const a = document.createElement('audio');
  a.src = audioUrl;
  a.preload = 'metadata';
  let speedIdx = 0;

  const btn = document.createElement('button');
  btn.className = 'sp-play';
  btn.innerHTML = '&#9654;';

  const time = document.createElement('div');
  time.className = 'sp-time';
  time.textContent = '00:00 / 00:00';

  const seek = document.createElement('div');
  seek.className = 'sp-seek';
  const seekProgress = document.createElement('div');
  seekProgress.className = 'sp-seek-progress';
  seek.appendChild(seekProgress);

  const speedBtn = document.createElement('button');
  speedBtn.className = 'sp-speed';
  speedBtn.textContent = '1.0x';

  btn.addEventListener('click', () => {
    // Andere Segment-Player pausieren
    document.querySelectorAll('.segment-player audio').forEach(other => {
      if (other !== a) other.pause();
    });
    if (a.paused) { a.play(); btn.innerHTML = '&#10074;&#10074;'; }
    else { a.pause(); btn.innerHTML = '&#9654;'; }
  });
  a.addEventListener('pause', () => { btn.innerHTML = '&#9654;'; });
  a.addEventListener('play', () => { btn.innerHTML = '&#10074;&#10074;'; });
  a.addEventListener('ended', () => { btn.innerHTML = '&#9654;'; });

  a.addEventListener('timeupdate', () => {
    const d = a.duration || 0;
    const t = a.currentTime || 0;
    time.textContent = `${formatTime(t)} / ${formatTime(d)}`;
    seekProgress.style.width = (d ? (t / d) * 100 : 0) + '%';
  });
  a.addEventListener('loadedmetadata', () => {
    time.textContent = `00:00 / ${formatTime(a.duration || 0)}`;
  });

  seek.addEventListener('click', (e) => {
    const rect = seek.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (a.duration) a.currentTime = pct * a.duration;
  });

  speedBtn.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % segSpeeds.length;
    a.playbackRate = segSpeeds[speedIdx];
    speedBtn.textContent = segSpeeds[speedIdx].toFixed(2).replace(/0$/, '') + 'x';
  });

  player.appendChild(btn);
  player.appendChild(time);
  player.appendChild(seek);
  player.appendChild(speedBtn);
  player.appendChild(a);
  return player;
}

// ── Audio Player ──────────────────────────────────────────────────────────
function togglePlay() {
  if (audio.paused) {
    audio.play();
    document.getElementById('btn-play').innerHTML = '&#10074;&#10074;';
  } else {
    audio.pause();
    document.getElementById('btn-play').innerHTML = '&#9654;';
  }
}
window.togglePlay = togglePlay;

function seekAudio(e) {
  const bar = document.getElementById('waveform-bar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
  }
}
window.seekAudio = seekAudio;

function cycleSpeed() {
  const idx = speeds.indexOf(currentSpeed);
  currentSpeed = speeds[(idx + 1) % speeds.length];
  audio.playbackRate = currentSpeed;
  document.getElementById('speed-btn').textContent = currentSpeed.toFixed(1) + 'x';
}
window.cycleSpeed = cycleSpeed;

function onTimeUpdate() {
  const t = audio.currentTime;
  const d = audio.duration || 0;

  // Update time display
  document.getElementById('time-display').textContent =
    `${formatTime(t)} / ${formatTime(d)}`;

  // Update progress bar
  const pct = d ? (t / d * 100) : 0;
  document.getElementById('waveform-progress').style.width = pct + '%';
  document.getElementById('waveform-cursor').style.left = pct + '%';

  // Highlight current word
  highlightCurrentWord(t);
}

let lastHighlighted = null;
function highlightCurrentWord(time) {
  if (lastHighlighted) {
    lastHighlighted.classList.remove('highlight');
    lastHighlighted = null;
  }

  for (let i = wordElements.length - 1; i >= 0; i--) {
    const el = wordElements[i];
    const start = parseFloat(el.dataset.start);
    const end = parseFloat(el.dataset.end);
    if (!isNaN(start) && !isNaN(end) && time >= start && time <= end + 0.1) {
      el.classList.add('highlight');
      lastHighlighted = el;

      // Scroll into view if needed
      const container = document.getElementById('editor-scroll');
      const elRect = el.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      if (elRect.top < contRect.top + 60 || elRect.bottom > contRect.bottom - 60) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      break;
    }
  }
}

// ── Save Correction ───────────────────────────────────────────────────────
let saveInFlight = false;
let autoSaveTimer = null;

async function saveCorrection(opts) {
  if (!currentSession) return;
  const silent = !!(opts && opts.silent);
  if (saveInFlight) return;
  saveInFlight = true;

  const btn = document.getElementById('btn-save');
  const origText = btn.textContent;
  if (!silent) {
    btn.disabled = true;
    btn.textContent = 'Speichert...';
  }
  setStatus('saving', silent ? 'Automatisches Speichern…' : 'Wird gespeichert...');

  try {
    const resp = await fetch(`${BACKEND}/api/session/${currentSession.sessionId}/correct`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blocks: currentBlocks }),
    });

    if (!resp.ok) throw new Error('Speichern fehlgeschlagen');
    const result = await resp.json();

    isDirty = false;
    updateDirtyState();

    // Update download link
    document.getElementById('btn-download').href = `${BACKEND}${result.downloadUrl}`;

    setStatus('saved', `Gespeichert um ${new Date().toLocaleTimeString('de-DE')}`);
    if (!silent) showToast('Gespeichert! Neues DOCX generiert.', 'success');

    // Refresh session list to show corrected status
    loadSessions();
  } catch (err) {
    console.error('Speichern fehlgeschlagen:', err);
    if (!silent) showToast('Fehler beim Speichern: ' + err.message, 'error');
    setStatus('unsaved', 'Fehler beim Speichern');
  } finally {
    saveInFlight = false;
    if (!silent) {
      btn.disabled = !isDirty;
      btn.textContent = origText;
    }
  }
}
window.saveCorrection = saveCorrection;

function scheduleAutoSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    if (isDirty && !saveInFlight) saveCorrection({ silent: true });
  }, 1500);
}

// Vor Schließen/Wechsel warnen, wenn noch ungespeichert
window.addEventListener('beforeunload', (e) => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// Download-Button: bei isDirty erst speichern, dann downloaden
document.addEventListener('DOMContentLoaded', () => {
  const dl = document.getElementById('btn-download');
  if (!dl) return;
  dl.addEventListener('click', async (e) => {
    if (!isDirty) return; // Normaler Download
    e.preventDefault();
    await saveCorrection();
    // Programmatischer Download via temp-Anchor (umgeht den Listener)
    const a = document.createElement('a');
    a.href = dl.href;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    a.remove();
  });
});

// ── UI Helpers ────────────────────────────────────────────────────────────
function updateDirtyState() {
  const btn = document.getElementById('btn-save');
  btn.disabled = !isDirty;
  if (isDirty) {
    setStatus('unsaved', 'Ungespeicherte Aenderungen');
    scheduleAutoSave();
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function formatTime(sec) {
  if (!sec && sec !== 0) return '00:00';
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}
